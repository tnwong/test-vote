<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份驗證</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f5; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #msg { color: #666; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>投票者登入</h2>
    <input type="password" id="pw" placeholder="請輸入授權碼">
    <button onclick="checkAuth()">驗證並進入</button>
    <p id="msg"></p>
</div>

<script>
    async function checkAuth() {
        const pw = document.getElementById('pw').value.trim();
        const msg = document.getElementById('msg');
        // ⚠️ 替換成你剛剛部署的最新 GAS API 網址
        const apiUrl = "https://script.google.com/macros/s/AKfycbyfOx5uzDc5bQmX5T6vVov-dJPrbsg5lpo63B4QFkirTM4qx6KiXKldN8aLJHus1xza/exec";

        if (!pw) return alert("請輸入代碼");

        msg.innerText = "⏳ 驗證中，請稍候...";

        try {
            // 向 GAS 請求驗證
            const response = await fetch(`${apiUrl}?key=${encodeURIComponent(pw)}`);
            const result = await response.json();

            if (result.auth === true) {
                msg.style.color = "green";
                msg.innerText = "✅ 驗證成功！跳轉中...";
                // 登入成功，跳轉到同目錄下的 index.html
                window.location.href = "index.html";
            } else {
                msg.style.color = "red";
                msg.innerText = "❌ 授權碼無效";
            }
        } catch (error) {
            msg.innerText = "⚠️ 系統連線錯誤，請稍後再試";
            console.error(error);
        }
    }
</script>

</body>
</html>
