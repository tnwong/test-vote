<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>委員會成員選舉 (10選8)</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f4f7f9; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .vote-item { display: flex; align-items: center; padding: 12px; border: 1px solid #eee; margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .vote-item:hover { background-color: #f0f7ff; }
        .vote-item input { margin-right: 15px; transform: scale(1.5); }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 20px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #msg { color: #666; margin-top: 10px; }
        #vote-section, #finish-section { display: none; }
        .counter { color: #1a73e8; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div id="auth-section">
        <h2>身份驗證</h2>
        <input type="password" id="pw" style="width:100%; padding:15px; margin:20px 0; border:2px solid #ddd; border-radius:10px; text-align:center;" placeholder="請輸入授權碼">
        <button onclick="checkAuth()">進入投票系統</button>
        <p id="msg">驗證通過後即可選擇 1-8 名候選人</p>
    </div>

    <div id="vote-section">
        <h2>委員會成員選舉</h2>
        <div class="counter">已選擇 <span id="countText">0</span> / 8 人</div>
        
        <div id="candidates">
            </div>

        <button id="submitBtn" onclick="submitVote()" disabled>確認送出</button>
    </div>

    <div id="finish-section">
        <h2 style="color: #28a745;">✅ 投票完成</h2>
        <p>您的選票已成功加密存入系統。</p>
    </div>
</div>

<script>
    let currentKey = "";
    const apiUrl = "你的_GAS_部署網址"; // ⬅️ 記得換成新的！
    const candidateNames = ["陳大文", "李小華", "張志明", "王美玲", "趙又廷", "孫小果", "周杰倫", "林俊傑", "蔡依林", "蕭敬騰"];

    // 初始化候選人列表
    const container = document.getElementById('candidates');
    candidateNames.forEach((name, index) => {
        const div = document.createElement('div');
        div.className = 'vote-item';
        div.innerHTML = `<label style="display:flex; width:100%; cursor:pointer;">
            <input type="checkbox" name="candidate" value="${name}" onchange="updateCount()">
            ${index + 1}. ${name}
        </label>`;
        container.appendChild(div);
    });

    function updateCount() {
        const checked = document.querySelectorAll('input[name="candidate"]:checked');
        const count = checked.length;
        document.getElementById('countText').innerText = count;
        
        // 限制最多 8 人，超過就取消最後一個勾選
        if (count > 8) {
            alert("最多只能選擇 8 位候選人！");
            event.target.checked = false;
            updateCount();
            return;
        }

        // 必須選擇至少 1 人才能送出
        document.getElementById('submitBtn').disabled = (count === 0);
    }

    async function checkAuth() {
        const pw = document.getElementById('pw').value.trim();
        if(!pw) return;
        document.getElementById('msg').innerText = "⏳ 驗證中...";
        try {
            const resp = await fetch(`${apiUrl}?key=${encodeURIComponent(pw)}`);
            const data = await resp.json();
            if (data.auth) {
                currentKey = pw;
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('vote-section').style.display = 'block';
            } else {
                document.getElementById('msg').innerText = "❌ 授權碼無效";
            }
        } catch (e) {
            document.getElementById('msg').innerText = "⚠️ 系統繁忙";
        }
    }

    async function submitVote() {
        const checked = document.querySelectorAll('input[name="candidate"]:checked');
        const selectedNames = Array.from(checked).map(cb => cb.value).join(", ");
        
        if(!confirm(`您選擇了：\n${selectedNames}\n確定要送出嗎？`)) return;

        document.getElementById('vote-section').innerHTML = "⏳ 正在存入選票...";
        try {
            await fetch(`${apiUrl}?key=${encodeURIComponent(currentKey)}&vote=${encodeURIComponent(selectedNames)}`);
            document.getElementById('vote-section').style.display = 'none';
            document.getElementById('finish-section').style.display = 'block';
        } catch (e) {
            alert("提交失敗，請重試");
        }
    }
</script>
</body>
</html>
