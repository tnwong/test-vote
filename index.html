<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>委員會成員選舉</title>
    <style>
        :root { --primary: #4a90e2; --success: #28a745; --gray: #666; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; width: 100%; box-sizing: border-box; }
        h2 { text-align: center; color: #333; margin: 0 0 10px 0; }
        .info { text-align: center; color: var(--gray); background: #eef2f5; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 0.95em; line-height: 1.5; }
        .candidate-list { display: grid; gap: 10px; }
        .candidate-item { display: flex; align-items: center; padding: 12px; border: 2px solid #eee; border-radius: 8px; cursor: pointer; transition: 0.2s; position: relative; }
        .candidate-item:hover { border-color: var(--primary); }
        .candidate-item input { margin-right: 15px; width: 18px; height: 18px; cursor: pointer; }
        .candidate-item.selected { border-color: var(--primary); background: #f0f7ff; }
        .candidate-item.disabled { opacity: 0.5; cursor: not-allowed; background: #fafafa; }
        button { display: block; width: 100%; padding: 15px; margin-top: 25px; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #counter { font-weight: bold; color: var(--primary); font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <h2>委員會成員選舉</h2>
    <div class="info">
        請選出 <strong>1 至 <span id="maxLabel">8</span> 位</strong> 候選人<br>
        ( 目前已選: <span id="counter">0</span> / <span id="maxDisplay">8</span> )
    </div>
    
    <form id="voteForm">
        <div class="candidate-list" id="candidateList">
            </div>
        <button type="submit" id="submitBtn">確認提交投票</button>
    </form>
</div>

<script>
    // ==========================================
    // 1. 配置區 (修改這裡即可調整設定)
    // ==========================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx26kVJyv1e0ESn6KA5fhi7D6n7DxhAyIhH-agaJdA-7rlf6pWTPqSe3eFxRC6QzsBA/exec";
    
    // 候選人名單 (可自由增減)
    const candidatesNames = [
        "陳大文", "李小華", "張志明", "王美玲", "趙又廷", 
        "孫悟空", "周杰倫", "林俊傑", "蔡英文", "郭台銘"
    ];
    
    // 最大勾選數量
    const MAX_VOTES = 8; 

    // ==========================================
    // 2. 初始化畫面
    // ==========================================
    const listContainer = document.getElementById('candidateList');
    const counterDisplay = document.getElementById('counter');
    document.getElementById('maxLabel').textContent = MAX_VOTES;
    document.getElementById('maxDisplay').textContent = MAX_VOTES;

    candidatesNames.forEach((name, i) => {
        const label = document.createElement('label');
        label.className = 'candidate-item';
        label.innerHTML = `
            <input type="checkbox" name="candidate" value="${name}">
            <span>${String(i + 1).padStart(2, '0')}. ${name}</span>
        `;
        listContainer.appendChild(label);
    });

    const checkboxes = document.querySelectorAll('input[name="candidate"]');
    
    listContainer.addEventListener('change', () => {
        const selectedCount = document.querySelectorAll('input[name="candidate"]:checked').length;
        counterDisplay.textContent = selectedCount;

        checkboxes.forEach(cb => {
            const item = cb.parentElement;
            item.classList.toggle('selected', cb.checked);
            
            // 超過上限時禁用
            if (selectedCount >= MAX_VOTES) {
                if (!cb.checked) {
                    cb.disabled = true;
                    item.classList.add('disabled');
                }
            } else {
                cb.disabled = false;
                item.classList.remove('disabled');
            }
        });
    });

    // ==========================================
    // 3. 提交邏輯 (包含名單確認功能)
    // ==========================================
    document.getElementById('voteForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // 取得已勾選名單
        const selected = Array.from(document.querySelectorAll('input[name="candidate"]:checked')).map(cb => cb.value);
        
        if (selected.length === 0) {
            alert("請至少選擇一位候選人！");
            return;
        }

        // --- 核心改進：確認視窗顯示名單 ---
        const namesText = selected.map((name, i) => `${i + 1}. ${name}`).join('\n');
        const confirmMsg = `您總共選擇了 ${selected.length} 位候選人：\n\n${namesText}\n\n確認要提交投票嗎？`;

        if (!confirm(confirmMsg)) return;
        // ------------------------------

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = "正在傳送...";

        // 建立動態表單 (針對 Google Sites 穩定傳輸)
        const tempForm = document.createElement('form');
        tempForm.method = 'POST';
        tempForm.action = SCRIPT_URL;
        tempForm.target = 'hidden_iframe';

        const input1 = document.createElement('input');
        input1.type = 'hidden';
        input1.name = 'candidates';
        input1.value = JSON.stringify(selected); // 傳送字串化的陣列
        tempForm.appendChild(input1);

        const input2 = document.createElement('input');
        input2.type = 'hidden';
        input2.name = 'ip';
        input2.value = navigator.userAgent.length + "_" + screen.width + "x" + screen.height;
        tempForm.appendChild(input2);

        // 建立隱藏 iframe 接收回應
        let iframe = document.getElementById('hidden_iframe');
        if (!iframe) {
            iframe = document.createElement('iframe');
            iframe.id = 'hidden_iframe';
            iframe.name = 'hidden_iframe';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
        }

        document.body.appendChild(tempForm);
        tempForm.submit();

        // 提交後 UI 回饋
        setTimeout(() => {
            alert("投票已成功送出！");
            document.querySelector('.container').innerHTML = `
                <div style="text-align:center; padding: 30px;">
                    <h2 style="color:var(--success);">感謝您的參與</h2>
                    <p>您的投票資料已記錄到試算表中。</p>
                    <button onclick="window.location.reload()" style="background:var(--primary); width:auto; padding:10px 20px; border:none; color:white; border-radius:5px; cursor:pointer;">返回投票頁面</button>
                </div>
            `;
            if (tempForm.parentNode) tempForm.parentNode.removeChild(tempForm);
        }, 1500);
    });
</script>

</body>
</html>
