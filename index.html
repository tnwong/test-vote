<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>授權系統</title>
    <style>
        body { background: #202124; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .login-box { background: #2d2e31; padding: 40px; border-radius: 12px; width: 320px; text-align: center; border: 1px solid #444; }
        input { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; background: #3c4043; border: 1px solid #555; color: white; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #00e676; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        #msg { margin-top: 15px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div class="login-box">
    <h3>驗證登入</h3>
    <input type="password" id="userInput" placeholder="請輸入授權碼...">
    <button onclick="verify()">確認</button>
    <p id="msg">系統初始化中...</p>
</div>

<script>
    let validKeys = new Set();

    // 啟動時立即嘗試讀取
    async function init() {
        const msg = document.getElementById('msg');
        try {
            const response = await fetch('whitelist.json');
            if (!response.ok) throw new Error("找不到檔案");
            const data = await response.json();
            validKeys = new Set(data);
            msg.innerText = "系統就緒 (已載入 " + validKeys.size + " 組)";
            msg.style.color = "#00e676";
        } catch (err) {
            console.error(err);
            msg.innerText = "連線錯誤：請使用伺服器環境開啟 (Live Server)";
            msg.style.color = "#ff5252";
        }
    }

    init();

    async function verify() {
    const input = document.getElementById('userInput').value.trim();
    const msg = document.getElementById('msg');
    const api_url = "https://script.google.com/macros/s/AKfycbxxo3M7X6w8IlabUsEABiWxcUmPz3C021vMr4vzp9QioAsl9OAbTl8OJOCqK79H761K/exec"; // 貼上剛才複製的 /exec 網址

    msg.innerText = "驗證中...";
    
    try {
        const response = await fetch(api_https://script.google.com/macros/s/AKfycbw9azXmnnfEIl3LybFYKBK53xG9lBAhPPlU0Ne4cmqFGG9CcfwetIUnUI7i46MfXnjn/exec, {
            method: "POST",
            body: JSON.stringify({ key: input })
        });
        const result = await response.json();

        if (result.status === "success") {
            msg.style.color = "#00e676";
            msg.innerText = "驗證成功！正在跳轉...";
            setTimeout(() => {
                window.top.location.href = atob(result.url);
            }, 800);
        } else {
            msg.innerText = "授權碼無效";
            msg.style.color = "#ff5252";
        }
    } catch (err) {
        msg.innerText = "系統錯誤，請稍後再試";
    }
}
