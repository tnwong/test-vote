<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>委員會成員選舉</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f4f7f9; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); text-align: center; width: 340px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #eee; border-radius: 10px; font-size: 18px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .vote-btn { background: white; color: #1a73e8; border: 2px solid #1a73e8; }
        .vote-btn:hover { background: #1a73e8; color: white; }
        #vote-section, #finish-section { display: none; }
        #msg { color: #666; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div id="auth-section">
        <h2>身份驗證</h2>
        <input type="password" id="pw" placeholder="請輸入授權碼">
        <button onclick="checkAuth()">驗證身份</button>
        <p id="msg">請輸入白名單代碼以取得投票權</p>
    </div>

    <div id="vote-section">
        <h2 style="color: #1a73e8;">請投下您的一票</h2>
        <p>您的身份：<span id="user-id" style="font-weight:bold;"></span></p>
        <button class="vote-btn" onclick="submitVote('候選人 A')">候選人 A</button>
        <button class="vote-btn" onclick="submitVote('候選人 B')">候選人 B</button>
        <button class="vote-btn" onclick="submitVote('候選人 C')">候選人 C</button>
    </div>

    <div id="finish-section">
        <h2 style="color: #28a745;">✅ 投票成功</h2>
        <p>感謝您的參與，投票結果已存入系統。</p>
    </div>
</div>

<script>
    let currentKey = "";
    const apiUrl = "你的_GAS_部署網址"; // 記得替換！

    async function checkAuth() {
        const pw = document.getElementById('pw').value.trim();
        const msg = document.getElementById('msg');
        if(!pw) return;

        msg.innerText = "⏳ 正在驗證...";
        try {
            const resp = await fetch(`${apiUrl}?key=${encodeURIComponent(pw)}`);
            const data = await resp.json();
            if (data.auth) {
                currentKey = pw;
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('vote-section').style.display = 'block';
                document.getElementById('user-id').innerText = pw;
            } else {
                msg.innerText = "❌ 授權碼無效";
                msg.style.color = "red";
            }
        } catch (e) {
            msg.innerText = "⚠️ 連線失敗，請檢查 GAS 權限";
        }
    }

    async function submitVote(name) {
        if(!confirm(`確定要投票給「${name}」嗎？`)) return;
        
        document.getElementById('vote-section').innerHTML = "⏳ 正在送出選票...";
        try {
            await fetch(`${apiUrl}?key=${encodeURIComponent(currentKey)}&vote=${encodeURIComponent(name)}`);
            document.getElementById('vote-section').style.display = 'none';
            document.getElementById('finish-section').style.display = 'block';
        } catch (e) {
            alert("提交失敗，請重試");
        }
    }
</script>
</body>
</html>
