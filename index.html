<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>委員會內部投票</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .vote-option { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #fff; border: 2px solid #1a73e8; color: #1a73e8; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .vote-option:hover { background: #1a73e8; color: white; }
        #msg { margin-top: 15px; font-size: 14px; color: #666; }
        #vote-section, #finish-section { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="auth-section">
        <h2>身份驗證</h2>
        <input type="password" id="pw" placeholder="請輸入授權碼">
        <button onclick="checkAuth()">進入投票系統</button>
        <p id="msg">請使用白名單代碼登入</p>
    </div>

    <div id="vote-section">
        <h2>請選擇候選人</h2>
        <p>您的代碼：<span id="user-display" style="font-weight:bold;"></span></p>
        <button class="vote-option" onclick="submitVote('01. 陳大文')">01. 陳大文</button>
        <button class="vote-option" onclick="submitVote('02. 李小華')">02. 李小華</button>
        <button class="vote-option" onclick="submitVote('廢票 / 棄權')">廢票 / 棄權</button>
    </div>

    <div id="finish-section">
        <h2 style="color: #28a745;">✅ 投票完成</h2>
        <p>您的選票已成功記錄至系統。</p>
    </div>
</div>

<script>
    let savedKey = "";
    const apiUrl = "https://script.google.com/macros/s/AKfycbxZPKqbiwDRn3Ozb_-gmAcS1aEK-vOTAHOoQPvaWtRF4zZzt_u4Ta7j95RK9CJMEoMh/exec";

    async function checkAuth() {
        const pw = document.getElementById('pw').value.trim();
        const msg = document.getElementById('msg');
        if (!pw) return;

        msg.innerText = "⏳ 驗證中...";
        try {
            const resp = await fetch(`${apiUrl}?key=${encodeURIComponent(pw)}`);
            const data = await resp.json();
            if (data.auth) {
                savedKey = pw;
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('vote-section').style.display = 'block';
                document.getElementById('user-display').innerText = pw;
            } else {
                msg.innerText = "❌ 授權碼無效";
                msg.style.color = "red";
            }
        } catch (e) {
            msg.innerText = "⚠️ 系統連線失敗，請檢查 GAS 權限";
        }
    }

    async function submitVote(option) {
        if (!confirm(`確定要投給「${option}」嗎？`)) return;
        
        document.getElementById('vote-section').innerHTML = "⏳ 正在傳送選票...";
        try {
            await fetch(`${apiUrl}?key=${encodeURIComponent(savedKey)}&vote=${encodeURIComponent(option)}`);
            document.getElementById('vote-section').style.display = 'none';
            document.getElementById('finish-section').style.display = 'block';
        } catch (e) {
            alert("傳送失敗，請重試");
        }
    }
</script>
</body>
</html>
